output_root: runs/hierarchical_reduction_evaluation
pairing_group: aggregation_topology_evaluation
parallel_execution:
  node_count: 2
  devices_per_node: 2
  device_count: 4
  client_processes_per_device: 1
  process_count: 4
  control_backend: nccl
  cuda_process_service: none
  client_assignment: event_structure_longest_processing_time
  aggregation_order: selected_client_order
  aggregation_topology: flat_ordered
  rank_mapping: node_major_local_rank
  synchronize_each_round: true
execution_measurement:
  profiler_enabled: false
  profiled_rounds: []
  record_cuda_memory: true
  record_device_utilization: true
  utilization_interval_seconds: 2
scheduler:
  strategy: event_structure_longest_processing_time
  tie_breaking_version: cost_position_client_then_load_count_rank_v1
  predictions_before_client_training: true
  training_data_only: true
  cost_model:
    name: event_structure
    artifact_path: results/resource_measurement/client_cost_model.json
    expected_sha256: 78ad111c6997999e017b7b29c07fadfdab86a11a83c128b06e2b8924d4a1471c
    schema_version: 1
    target: client_wall_time_seconds
    feature_order:
      - example_count
      - local_batch_count
      - total_raw_input_events
      - mean_sequence_length
      - median_sequence_length
      - maximum_sequence_length
      - total_valid_time_bins
      - estimated_padded_time_bins
      - padding_fraction
      - event_density
    fitting_seeds: [7, 17]
    excluded_evaluation_seed: 27
    source_execution_commit: 3ddae173c89125bc69922d80bde5732ed6cd050e
    provenance_artifact_path: results/resource_measurement/cost_model_evaluation.json
    expected_provenance_sha256: 1488d3542e5b0770ab750b9d3812aeeac86bc091e3a11954e1f8a6a73ba9f924
    total_accepted_rows: 6000
    model_fitting_rows: 4000
    untouched_evaluation_rows: 2000
    compatible_dataset_models:
      shd: lif_2layer
      ssc: lif_2layer_128
aggregation_execution:
  topology: flat_ordered
  order_policy: selected_client_order
  accumulator_dtype: float64
  absolute_tolerance: 0.000001
  relative_tolerance: 0.00001
  material_runtime_regression_fraction: 0.02
evaluation:
  collection: hierarchical_reduction_evaluation
  comparison_reference: declared_by_treatment_configuration
  within_allocation_execution: counterbalanced_sequential
  independent_process_invocation: true
metadata:
  purpose: hierarchical_reduction_evaluation
