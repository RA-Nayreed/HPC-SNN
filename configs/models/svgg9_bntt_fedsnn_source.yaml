model:
  name: svgg9_bntt
  channels: [64, 64, 128, 128, 256, 256, 256]
  average_pool_after_convolution: [2, 4, 7]
  linear_hidden: 1024
  timesteps: 20
  leak: 0.95
  threshold: 1.0
  surrogate_scale: 0.3
  bntt_momentum: 0.1
  bntt_epsilon: 0.0001
  input_encoding: signed_poisson
  poisson_rescale_factor: 2.0
  readout: temporal_mean
  weight_initialization: xavier_uniform_gain_2
