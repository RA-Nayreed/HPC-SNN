dataset:
  name: cifar10
  root: data/cifar10
  classes: 10
  channels: 3
  image_size: 32
  validation_fraction: 0.1
  standard_train_split: true
  standard_test_split: true
  download_during_training: false
  transforms:
    image_size: 32
    normalization: signed_minus_one_one
    augmentation:
      random_crop: false
      crop_padding: 0
      horizontal_flip: false
      horizontal_flip_probability: 0.0
