federated:
  algorithm: fedavg
  rounds: 100
  clients: 10
  clients_per_round: 2
  participation_fraction: 0.20
  local_epochs: 5
  local_batch_size: 32
  drop_last_local_batch: true
  aggregation_weighting: uniform
  checkpoint_selection: final_round
  optimizer: sgd
  learning_rate: 0.1
  momentum: 0.95
  weight_decay: 0.0001
  gradient_clip: null
  learning_rate_reduction_rounds: [40, 60, 80]
  learning_rate_reduction_factor: 5
  client_sampling: without_replacement
  retain_optimizer_state: false
  official_test_evaluation_during_rounds: false
  record_extended_diagnostics: true
  data_loader_workers: 8
  persistent_workers: true
  partition:
    method: fedsnn_balanced_label_dirichlet
    alpha: 0.5
    minimum_examples_per_client: 10
    maximum_attempts: 1000
  communication:
    model_downloads_per_selected_client: 1
    model_uploads_per_selected_client: 1
    include_optimizer_state: false
    include_dataset_transfer: false
provenance:
  require_git_commit: true
  require_dataset_identity: true
  require_split_identity: true
  require_partition_identity: true
  require_model_initialization_identity: true
seed_streams:
  split: split
  partition: partition
  model_initialization: model_initialization
  client_selection: client_selection
  client_training: client_training
  validation: validation
  final_test: final_test
