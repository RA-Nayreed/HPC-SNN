name: Centralized CPU checks
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - name: Install CPU PyTorch
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
      - name: Install package and test tools
        run: python -m pip install -e ".[dev]"
      - name: Packaging check
        run: python -m pip check
      - name: Ruff
        run: ruff check src tests
      - name: Pytest including CPU synthetic integration
        run: pytest -m "not dcls and not cuda"
